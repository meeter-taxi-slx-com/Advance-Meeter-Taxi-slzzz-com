<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="app-title-tab">ADVANCE MEETER TAXI</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a4a9e">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #1a4a9e; --secondary: #2ecc71; --accent: #e74c3c; --dark: #2c3e50; --gray: #f8f9fa; --shadow: 0 10px 30px rgba(0,0,0,0.08); }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #eef2f7; margin: 0; padding: 15px; display: flex; justify-content: center; overflow-x: hidden; }
        .app-container { background: white; width: 100%; max-width: 420px; border-radius: 45px; box-shadow: var(--shadow); padding: 25px; position: relative; border: 8px solid #fff; box-sizing: border-box; }
        .header-section { text-align: center; margin-bottom: 20px; position: relative; }
        .logo-area { width: 70px; height: 70px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: 900; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .logo-area img { width: 100%; height: 100%; object-fit: cover; }
        .brand-name { color: var(--primary); font-size: 20px; font-weight: 800; text-transform: uppercase; }
        .settings-btn { position: absolute; right: 0; top: 10px; cursor: pointer; font-size: 22px; }
        
        input, select, textarea { width: 100%; padding: 14px; margin: 5px 0; border: 1px solid #e0e6ed; border-radius: 15px; background: var(--gray); font-family: inherit; box-sizing: border-box; font-size: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: 700; color: #7f8c8d; margin-left: 5px; text-transform: uppercase; display: block; margin-top: 5px;}
        
        .btn-main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        button { border: none; border-radius: 166px; font-size: 14px; font-weight: 800; color: white; cursor: pointer; padding: 16px; transition: 0.3s; text-transform: uppercase; }
        .btn-start { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .btn-end { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-new { background: linear-gradient(135deg, #3498db, #2980b9); width: 100%; margin-top: 12px; }
        
        @keyframes pulse-btn { 0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); } }
        @keyframes neon-blink { 0%, 100% { opacity: 1; text-shadow: 0 0 10px #2ecc71; } 50% { opacity: 0.7; text-shadow: 0 0 20px #2ecc71, 0 0 30px #2ecc71; } }
        
        .btn-active-anim { animation: pulse-btn 1.5s infinite; background: #27ae60 !important; }
        .dist-active-anim { animation: neon-blink 1s infinite; color: #2ecc71 !important; }

        .fare-display-card { background: #fdfdfe; border-radius: 25px; padding: 20px; margin-top: 20px; border: 1px solid #edf2f7; text-align: center; }
        .display-val-km { font-size: 42px; font-weight: 900; color: var(--dark); margin: 5px 0; }
        .display-val-fare { font-size: 36px; font-weight: 900; color: var(--primary); }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 35px; padding: 20px; position: relative; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
        .close-circle { position: absolute; top: 15px; right: 15px; background: #eee; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5; }
        
        #receipt-render { padding: 15px; background: white; color: #333; font-family: sans-serif; }
        .r-header { background: #000; color: #fff; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; text-align: center; font-size: 14px; }
        .r-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #ccc; font-size: 12px; color: #333; }
        .r-row b { color: #000; }
        .r-total-box { background: #1a4a9e; color: white; padding: 15px; border-radius: 12px; font-size: 24px; font-weight: bold; text-align: center; margin: 20px 0; }
        
        .receipt-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-wa { background: #2ecc71; border-radius: 12px; }
        .btn-gm { background: #e74c3c; border-radius: 12px; }
        .btn-pdf { background: #34495e; width: 100%; margin-top: 10px; border-radius: 12px; }
        .btn-reprint { background: var(--primary); padding: 5px 10px; font-size: 10px; margin-top: 5px; width: auto; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-section">
        <div id="main-logo-area" class="logo-area">AMT</div>
        <div class="brand-name" id="display-app-name">ADVANCE MEETER TAXI</div>
        <div class="settings-btn" onclick="openLogin()">⚙️</div>
    </div>

    <div class="input-group">
        <input type="tel" id="mobile" placeholder="Customer Mobile (Optional)">
        <div class="grid-2">
            <input id="start-loc" list="wp-towns" placeholder="Pick Up Location">
            <input id="end-loc" list="wp-towns" placeholder="Drop Off Location">
            <datalist id="wp-towns"></datalist>
        </div>
        <div class="grid-2" style="align-items: center;">
            <input type="number" id="manual-fare" placeholder="Manual Fare (Optional)" oninput="updateDisplay()">
            <div style="display:flex; align-items:center; background:var(--gray); border-radius:15px; padding:0 10px; height: 48px;">
                <span style="font-size:10px; font-weight:bold;">Wait:</span>
                <select id="wait-select" onchange="updateDisplay()" style="background:transparent; border:none; width: 60px;">
                    <option value="0">0m</option>
                    <script>for(let i=1;i<=120;i++) document.write(`<option value="${i}">${i}m</option>`);</script>
                </select>
            </div>
        </div>
        <input type="number" id="discount-input" placeholder="Discount Amount (Rs.)" oninput="updateDisplay()">
    </div>

    <div class="btn-main-grid">
        <button class="btn-start" id="startBtn" onclick="startRide()">START RIDE</button>
        <button class="btn-end" onclick="endRide()">END RIDE</button>
    </div>
    <button class="btn-new" onclick="location.reload()">+ NEW RIDE</button>

    <div class="fare-display-card">
        <small id="dist-label">DISTANCE</small>
        <div class="display-val-km" id="disp-km">0.0 km</div>
        <hr style="opacity:0.1">
        <small>TOTAL FARE</small>
        <div class="display-val-fare" id="disp-fare">Rs. 0</div>
    </div>
</div>

<div id="login-modal" class="modal"><div class="modal-content" style="max-width: 280px;"><h3 style="text-align:center;">Admin Login</h3><input type="password" id="admin-pass-input" placeholder="Enter Password" style="text-align:center;"><button style="background:var(--primary); width:100%; margin-top:10px;" onclick="checkLogin()">LOGIN</button><button style="background:#ccc; width:100%; margin-top:5px; padding:10px; color:#333;" onclick="closeM('login-modal')">CANCEL</button></div></div>

<div id="settings-modal" class="modal"><div class="modal-content"><div class="close-circle" onclick="closeM('settings-modal')">✕</div><h3 style="text-align:center; color:var(--primary);">Settings</h3><label>App Name:</label><input type="text" id="set-app-name"><label>Receipt Header:</label><input type="text" id="set-receipt-header"><label>Logo Image (Upload):</label><input type="file" id="set-logo-upload" accept="image/*" style="padding: 10px;"><div class="grid-2"><div><label>Base (Rs):</label><input type="number" id="set-base"></div><div><label>Rate/KM:</label><input type="number" id="set-rate"></div></div><div class="grid-2"><div><label>Wait Rate:</label><input type="number" id="set-wait-rate"></div><div><label>Night %:</label><input type="number" id="set-night"></div></div><label>Town List (Comma Separated):</label><textarea id="set-towns" rows="3" style="font-size: 11px;"></textarea><label>Change Password:</label><input type="password" id="set-password"><button style="background:var(--secondary); width:100%; margin-top:10px;" onclick="saveSettings()">SAVE SETTINGS</button><hr style="margin:20px 0; opacity:0.1"><button style="background:var(--dark); width:100%; margin-bottom:5px;" onclick="openPanel('income-modal')">📊 INCOME REPORTS</button><button style="background:var(--dark); width:100%;" onclick="openPanel('history-modal')">📜 TRAVEL HISTORY</button></div></div>

<div id="receiptModal" class="modal">
    <div class="modal-content">
        <div class="close-circle" onclick="closeM('receiptModal')">✕</div>
        <div id="receipt-render">
            <div class="r-header" id="r-display-header">AMT OFFICIAL RECEIPT</div>
            <div id="r-body"></div>
            <div class="r-total-box">TOTAL: <span id="r-total"></span></div>
            <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0;"></div>
        </div>
        <div class="receipt-btns">
            <button class="btn-wa" onclick="shareWhatsApp()">WHATSAPP</button>
            <button class="btn-gm" onclick="sendGmail()">GMAIL</button>
        </div>
        <button class="btn-pdf" onclick="downloadPDF()">SAVE AS PDF</button>
    </div>
</div>

<div id="income-modal" class="modal"><div class="modal-content"><div class="close-circle" onclick="backToS('income-modal')">✕</div><h3 style="text-align:center;">Earnings</h3><canvas id="earningsChart"></canvas><div class="grid-2" style="margin-top:20px; text-align:center;"><div style="background:var(--gray); padding:10px; border-radius:10px;"><small>Today</small><br><b id="stat-today" style="color:var(--primary);">Rs. 0</b></div><div style="background:var(--gray); padding:10px; border-radius:10px;"><small>Total</small><br><b id="stat-month" style="color:var(--primary);">Rs. 0</b></div></div><button style="background:var(--primary); width:100%; margin-top:20px;" onclick="downloadCSV()">DOWNLOAD CSV</button></div></div>
<div id="history-modal" class="modal"><div class="modal-content"><div class="close-circle" onclick="backToS('history-modal')">✕</div><h3 style="text-align:center; color:var(--primary);">Travel History</h3><div id="history-list"></div></div></div>

<script>
    let sTime, watchID, totalKm = 0, lastLat, lastLon, currentRID = "";
    const DEFAULT_TOWNS = "Colombo 01, Colombo 02, Colombo 03, Colombo 04, Colombo 05, Colombo 06, Colombo 07, Colombo 08, Colombo 09, Colombo 10, Colombo 11, Colombo 12, Colombo 13, Colombo 14, Colombo 15, Dehiwala, Mount Lavinia, Ratmalana, Moratuwa, Kesbewa, Piliyandala, Maharagama, Boralesgamuwa, Nugegoda, Kottawa, Pannipitiya, Homagama, Malabe, Kaduwela, Battaramulla, Athurugiriya, Hanwella, Avissawella, Gampaha, Negombo, Katunayake, Seeduwa, Ja-Ela, Kandana, Wattala, Kelaniya, Peliyagoda, Kiribathgoda, Kadawatha, Ragama, Minuwangoda, Veyangoda, Nittambuwa, Kalutara, Panadura, Wadduwa, Beruwala, Aluthgama, Horana, Bandaragama, Matugama, Agalawatte, Ingiriya";
    
    let SETTINGS = { 
        base: 100, rate: 80, wait: 5, night: 10, 
        appName: "ADVANCE MEETER TAXI", receiptName: "AMT OFFICIAL RECEIPT", 
        password: "1234", logo: "", towns: DEFAULT_TOWNS
    };

    function generateReceiptID() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        let finYear = (month >= 3) ? year : year - 1;
        let yearPrefix = finYear.toString().slice(-2);
        let monthName = now.toLocaleString('en-GB', { month: 'short' }).toUpperCase();
        let counterKey = `amt_counter_${finYear}`;
        let count = parseInt(localStorage.getItem(counterKey) || "0") + 1;
        localStorage.setItem(counterKey, count);
        return `${yearPrefix}${monthName}-${count.toString().padStart(10, '0')}`;
    }

    function loadSettings() {
        const saved = localStorage.getItem('amt_pro_settings');
        if(saved) SETTINGS = {...SETTINGS, ...JSON.parse(saved)};
        document.getElementById('display-app-name').innerText = SETTINGS.appName;
        document.getElementById('r-display-header').innerText = SETTINGS.receiptName;
        document.getElementById('set-app-name').value = SETTINGS.appName;
        document.getElementById('set-receipt-header').value = SETTINGS.receiptName;
        document.getElementById('set-base').value = SETTINGS.base;
        document.getElementById('set-rate').value = SETTINGS.rate;
        document.getElementById('set-wait-rate').value = SETTINGS.wait;
        document.getElementById('set-night').value = SETTINGS.night;
        document.getElementById('set-towns').value = SETTINGS.towns;
        document.getElementById('wp-towns').innerHTML = SETTINGS.towns.split(',').map(t => `<option value="${t.trim()}">`).join('');
        if(SETTINGS.logo) document.getElementById('main-logo-area').innerHTML = `<img src="${SETTINGS.logo}">`;
        updateDisplay();
    }

    function saveSettings() {
        const fileInput = document.getElementById('set-logo-upload');
        const file = fileInput.files[0];
        const proceedSave = (logoData = SETTINGS.logo) => {
            SETTINGS.appName = document.getElementById('set-app-name').value;
            SETTINGS.receiptName = document.getElementById('set-receipt-header').value;
            SETTINGS.base = parseInt(document.getElementById('set-base').value);
            SETTINGS.rate = parseInt(document.getElementById('set-rate').value);
            SETTINGS.wait = parseInt(document.getElementById('set-wait-rate').value);
            SETTINGS.night = parseInt(document.getElementById('set-night').value);
            SETTINGS.towns = document.getElementById('set-towns').value;
            SETTINGS.logo = logoData;
            if(document.getElementById('set-password').value) SETTINGS.password = document.getElementById('set-password').value;
            localStorage.setItem('amt_pro_settings', JSON.stringify(SETTINGS));
            loadSettings(); closeM('settings-modal');
        };
        if (file) { const reader = new FileReader(); reader.onload = (e) => proceedSave(e.target.result); reader.readAsDataURL(file); } 
        else { proceedSave(); }
    }

    function updateDisplay() {
        let manual = parseInt(document.getElementById('manual-fare').value) ||
