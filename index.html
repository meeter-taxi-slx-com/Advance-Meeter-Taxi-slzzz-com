<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Meeter Taxi - v26 Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #1a4a9e; --secondary: #2ecc71; --accent: #e74c3c; --dark: #2c3e50; --gray: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 420px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); padding: 25px; }
        .logo-section { text-align: center; margin-bottom: 20px; position: relative; }
        .logo-circle { background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; font-weight: bold; border: 4px solid #fff; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .brand-name { color: var(--primary); font-size: 18px; font-weight: 900; }
        .settings-icon { position: absolute; right: 0; top: 10px; cursor: pointer; font-size: 20px; color: var(--primary); }
        input, textarea, select { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 14px; box-sizing: border-box; background: var(--gray); font-family: inherit; }
        
        /* Layout logic to match your image exactly */
        .fare-calc-box { background: var(--gray); border-radius: 15px; padding: 15px; margin: 10px 0; border: 1px solid #eee; text-align: center; }
        .calc-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .calc-label { font-size: 12px; color: #7f8c8d; font-weight: bold; }
        .calc-val-big { font-weight: 900; color: var(--primary); display: block; font-size: 38px; }
        
        /* Buttons strictly following image colors */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        button { border: none; border-radius: 12px; font-size: 13px; font-weight: bold; color: white; cursor: pointer; padding: 14px; transition: 0.3s; }
        .btn-start { background: #2ecc71; } /* Green */
        .btn-end { background: #e74c3c; }   /* Red */
        .btn-report { background: #34495e; } /* Dark Gray */
        .btn-history { background: #9b59b6; } /* Purple */
        .btn-new { background: #3498db; }    /* Light Blue */
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 85%; max-width: 360px; border-radius: 25px; padding: 30px 20px; position: relative; margin: auto; max-height: 90vh; overflow-y: auto; }
        .section-card { display: none; margin-top: 15px; padding: 15px; background: #fff; border-radius: 20px; border: 1px solid #eee; }
        .history-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 11px; }

        /* Receipt Style from v26 */
        #receipt-render { background: white; padding: 15px; border-radius: 15px; border: 1px solid #eee; text-align: center; }
        .r-header { background: black; color: white; padding: 8px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 10px; }
        .r-total-box { background: var(--primary); color: white; text-align: center; padding: 12px; border-radius: 8px; font-size: 18px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="logo-section">
        <div id="main-logo-area"><div class="logo-circle">AMT</div></div>
        <div class="brand-name">ADVANCE MEETER TAXI</div>
        <div class="settings-icon" onclick="toggleSection('settings-modal')">⚙️</div>
    </div>
    
    <input type="tel" id="mobile" placeholder="Customer Mobile (Optional)">
    <div style="display:flex; gap:8px;">
        <input list="wp-towns" id="start-loc" placeholder="Pick Up Location">
        <input list="wp-towns" id="end-loc" placeholder="Drop Off Location">
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
        <input type="number" id="manual-fare" placeholder="Manual Fare (Optional)">
        <div style="width:140px; display:flex; align-items:center;">
            <label style="font-size:10px; font-weight:bold; margin-right:5px;">Wait Time:</label>
            <select id="wait-select" onchange="updateDisplay()">
                <option value="0">0 min</option>
                <script>for(let i=1;i<=60;i++) document.write(`<option value="${i}">${i} min</option>`);</script>
            </select>
        </div>
    </div>

    <datalist id="wp-towns"></datalist>

    <div class="fare-calc-box">
        <div class="calc-grid">
            <div><span class="calc-label">DISTANCE</span><span class="calc-val-big" id="disp-km">0.0 km</span></div>
            <div style="border-top:1px solid #ddd; padding-top:10px;"><span class="calc-label">TOTAL FARE</span><span class="calc-val-big" id="disp-fare">Rs. 0</span></div>
        </div>
    </div>

    <div class="btn-grid">
        <button class="btn-start" id="startBtn" onclick="startRide()">START RIDE</button>
        <button class="btn-end" onclick="endRide()">END RIDE</button>
        <button class="btn-report" onclick="toggleSection('report-section')">INCOME REPORTS</button>
        <button class="btn-history" onclick="showHistory()">HISTORY</button>
        <button class="btn-new" onclick="location.reload()" style="grid-column: span 2;">+ NEW RIDE</button>
    </div>

    <div id="report-section" class="section-card">
        <h4 style="margin:0;">Daily Income</h4>
        <div id="stat-today" style="font-size:24px; font-weight:900; color:var(--primary);">Rs. 0</div>
        <canvas id="earningsChart" height="150"></canvas>
    </div>

    <div id="history-section" class="section-card">
        <h4 style="margin:0 0 10px 0;">Recent Rides</h4>
        <div id="history-list"></div>
    </div>

    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <div id="receipt-render">
                <div class="r-header">ADVANCE MEETER TAXI</div>
                <div id="r-body"></div>
                <div class="r-total-box" id="r-total"></div>
                <div id="qrcode" style="display:flex; justify-content:center; margin:10px;"></div>
            </div>
            <button style="background:var(--secondary); width:100%; margin-top:10px;" onclick="downloadPDF()">SAVE PDF</button>
            <button style="background:var(--accent); width:100%; margin-top:5px;" onclick="toggleSection('receiptModal')">CLOSE</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Settings</h3>
            <label>1st KM Rate:</label><input type="number" id="set-base">
            <label>Next KM Rate:</label><input type="number" id="set-rate">
            <label>Wait Rate /Min:</label><input type="number" id="set-wait-rate">
            <button style="background:var(--secondary); width:100%; margin-top:10px;" onclick="saveSettings()">SAVE</button>
            <button style="background:var(--accent); width:100%; margin-top:5px;" onclick="toggleSection('settings-modal')">CLOSE</button>
        </div>
    </div>
</div>

<script>
    // --- Firebase Configuration (v26 vith Cloud Sync) ---
    const firebaseConfig = {
        apiKey: "AIzaSyB2ZF9xap5SBGo5E_1G8d_23MkBkEGo-YY",
        authDomain: "as4-taxi-db.firebaseapp.com",
        projectId: "as4-taxi-db",
        storageBucket: "as4-taxi-db.firebasestorage.app",
        messagingSenderId: "823982155898",
        appId: "1:823982155898:web:ff9a793a4669a0058e73c3",
        databaseURL: "https://as4-taxi-db-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let sTime, watchID, totalKm = 0, lastLat, lastLon;
    let RATE = 80, BASE = 100, WAIT_RATE = 5;

    function loadSettings() {
        let s = JSON.parse(localStorage.getItem('as4_v26_settings') || JSON.stringify({base:100, rate:80, wait:5}));
        BASE = s.base; RATE = s.rate; WAIT_RATE = s.wait;
        document.getElementById('set-base').value = BASE;
        document.getElementById('set-rate').value = RATE;
        document.getElementById('set-wait-rate').value = WAIT_RATE;
    }

    function updateDisplay() {
        let wait = parseInt(document.getElementById('wait-select').value) * WAIT_RATE;
        let fare = Math.round(BASE + (Math.max(0, totalKm - 1) * RATE) + wait);
        document.getElementById('disp-km').innerText = totalKm.toFixed(2) + " km";
        if(!document.getElementById('manual-fare').value) document.getElementById('disp-fare').innerText = "Rs. " + fare;
        else document.getElementById('disp-fare').innerText = "Rs. " + document.getElementById('manual-fare').value;
    }

    function startRide() {
        sTime = new Date();
        document.getElementById('startBtn').innerText = "RIDE ACTIVE";
        watchID = navigator.geolocation.watchPosition(pos => {
            if (lastLat) totalKm += calcDist(lastLat, lastLon, pos.coords.latitude, pos.coords.longitude);
            lastLat = pos.coords.latitude; lastLon = pos.coords.longitude;
            updateDisplay();
        }, null, {enableHighAccuracy: true});
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function endRide() {
        if(!sTime) return;
        navigator.geolocation.clearWatch(watchID);
        let fare = parseInt(document.getElementById('disp-fare').innerText.replace('Rs. ', ''));
        let rid = "AMT-" + Date.now();
        
        let rideData = { f: fare, d: totalKm.toFixed(2), from: document.getElementById('start-loc').value || 'S', to: document.getElementById('end-loc').value || 'E', rid: rid, time: Date.now() };
        
        // Push to Firebase and Show Receipt
        db.ref('rides/' + rid).set(rideData).then(() => {
            document.getElementById('r-body').innerHTML = `ID: ${rid}<br>KM: ${totalKm.toFixed(2)}km<br>Wait: ${document.getElementById('wait-select').value}m`;
            document.getElementById('r-total').innerText = "Total: Rs. " + fare;
            new QRCode(document.getElementById("qrcode"), { text: rid, width: 80, height: 80 });
            toggleSection('receiptModal');
        });
    }

    function showHistory() {
        toggleSection('history-section');
        db.ref('rides').limitToLast(10).once('value', s => {
            let list = "";
            s.forEach(child => {
                let v = child.val();
                list += `<div class="history-item"><b>${v.rid}</b>: ${v.d}km - Rs.${v.f}</div>`;
            });
            document.getElementById('history-list').innerHTML = list;
        });
    }

    function toggleSection(id) {
        let el = document.getElementById(id);
        el.style.display = (el.style.display === "block" || el.style.display === "flex") ? "none" : (id.includes('modal') ? "flex" : "block");
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const canvas = await html2canvas(document.getElementById('receipt-render'));
        const pdf = new jsPDF('p', 'mm', [80, 160]);
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 80, 160);
        pdf.save("Receipt.pdf");
    }

    window.onload = loadSettings;
</script>
</body>
</html>
