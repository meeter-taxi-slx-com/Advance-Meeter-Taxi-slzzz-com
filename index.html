<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Meeter Taxi - v27 (Full Fixed)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <style>
        :root { --primary: #1a4a9e; --secondary: #2ecc71; --accent: #e74c3c; --dark: #2c3e50; --gray: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 420px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); padding: 20px; min-height: 90vh; }
        .logo-section { text-align: center; margin-bottom: 15px; position: relative; }
        .logo-circle { background: var(--primary); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-weight: bold; border: 3px solid #fff; font-size: 18px; }
        .brand-name { color: var(--primary); font-size: 16px; font-weight: 900; margin-top: 5px; }
        .settings-icon { position: absolute; right: 0; top: 5px; cursor: pointer; font-size: 18px; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 13px; box-sizing: border-box; background: var(--gray); }
        
        .fare-calc-box { background: var(--gray); border-radius: 15px; padding: 15px; margin: 15px 0; border: 1px solid #eee; text-align: center; }
        .calc-label { font-size: 11px; color: #7f8c8d; font-weight: bold; }
        .calc-val-big { font-weight: 900; color: var(--primary); display: block; font-size: 32px; }

        /* Buttons strictly following your image */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { border: none; border-radius: 10px; font-size: 12px; font-weight: bold; color: white; cursor: pointer; padding: 12px; }
        .btn-start { background: #2ecc71; } 
        .btn-end { background: #e74c3c; }   
        .btn-report { background: #34495e; } 
        .btn-history { background: #9b59b6; } 
        .btn-new { background: #3498db; width: 100%; margin-top: 8px; }

        /* Modals and Sections */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 85%; max-width: 350px; border-radius: 20px; padding: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .section-card { display: none; margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; }
        
        /* Receipt Design */
        #receipt-area { padding: 10px; border: 1px dashed #ccc; text-align: center; font-family: monospace; font-size: 12px; }
        .r-header { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .r-line { display: flex; justify-content: space-between; margin: 3px 0; }
        .r-total { font-size: 18px; font-weight: bold; border-top: 1px solid #000; padding-top: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="logo-section">
        <div class="logo-circle">AMT</div>
        <div class="brand-name">ADVANCE MEETER TAXI</div>
        <div class="settings-icon" onclick="toggleSection('settings-modal')">⚙️</div>
    </div>
    
    <input type="tel" id="mobile" placeholder="Customer Mobile (Optional)">
    <div style="display:flex; gap:5px;">
        <input id="start-loc" placeholder="Pick Up">
        <input id="end-loc" placeholder="Drop Off">
    </div>
    <div style="display:flex; gap:5px; align-items:center;">
        <input type="number" id="manual-fare" placeholder="Manual Fare" oninput="updateDisplay()">
        <select id="wait-select" onchange="updateDisplay()" style="width: 100px;">
            <option value="0">0 min</option>
            <script>for(let i=1;i<=60;i++) document.write(`<option value="${i}">${i} min</option>`);</script>
        </select>
    </div>

    <div class="fare-calc-box">
        <span class="calc-label">DISTANCE</span>
        <span class="calc-val-big" id="disp-km">0.0 km</span>
        <hr style="border:0; border-top:1px solid #ddd; margin:10px 0;">
        <span class="calc-label">TOTAL FARE</span>
        <span class="calc-val-big" id="disp-fare">Rs. 0</span>
    </div>

    <div class="btn-grid">
        <button class="btn-start" id="startBtn" onclick="startRide()">START RIDE</button>
        <button class="btn-end" onclick="endRide()">END RIDE</button>
        <button class="btn-report" onclick="showRevenue()">INCOME REPORTS</button>
        <button class="btn-history" onclick="showHistory()">HISTORY</button>
    </div>
    <button class="btn-new" onclick="location.reload()">+ NEW RIDE</button>

    <div id="receipt-modal" class="modal">
        <div class="modal-content">
            <div id="receipt-area">
                <div class="r-header">ADVANCE MEETER TAXI</div>
                <div id="r-content"></div>
                <div class="r-total" id="r-total"></div>
            </div>
            <button style="background:var(--secondary); width:100%; margin-top:10px;" onclick="printReceipt()">Download Receipt</button>
            <button style="background:var(--accent); width:100%; margin-top:5px;" onclick="toggleSection('receipt-modal')">Close</button>
        </div>
    </div>

    <div id="history-section" class="section-card">
        <h3>Ride History</h3>
        <div id="history-list"></div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Settings</h3>
            <label>1st KM:</label><input type="number" id="set-base">
            <label>Next KM:</label><input type="number" id="set-rate">
            <label>Wait/Min:</label><input type="number" id="set-wait">
            <button style="background:var(--secondary); width:100%;" onclick="saveSettings()">SAVE</button>
            <button style="background:var(--accent); width:100%; margin-top:5px;" onclick="toggleSection('settings-modal')">CLOSE</button>
        </div>
    </div>
</div>

<script>
    // Firebase Config (Verified from your image)
    const firebaseConfig = {
        apiKey: "AIzaSyB2ZF9xap5SBGo5E_1G8d_23MkBkEGo-YY",
        authDomain: "as4-taxi-db.firebaseapp.com",
        projectId: "as4-taxi-db",
        storageBucket: "as4-taxi-db.firebasestorage.app",
        messagingSenderId: "823982155898",
        appId: "1:823982155898:web:ff9a793a4669a0058e73c3",
        databaseURL: "https://as4-taxi-db-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let sTime, watchID, totalKm = 0, lastLat, lastLon;
    let RATE = 80, BASE = 100, WAIT_RATE = 5;

    function startRide() {
        sTime = new Date();
        document.getElementById('startBtn').innerText = "TRACKING...";
        watchID = navigator.geolocation.watchPosition(pos => {
            if (lastLat) {
                let d = calcDist(lastLat, lastLon, pos.coords.latitude, pos.coords.longitude);
                if(d > 0.01) totalKm += d;
            }
            lastLat = pos.coords.latitude; lastLon = pos.coords.longitude;
            updateDisplay();
        }, null, {enableHighAccuracy: true});
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function updateDisplay() {
        let wait = parseInt(document.getElementById('wait-select').value) * WAIT_RATE;
        let fare = Math.round(BASE + (Math.max(0, totalKm - 1) * RATE) + wait);
        document.getElementById('disp-km').innerText = totalKm.toFixed(2) + " km";
        let mFare = document.getElementById('manual-fare').value;
        document.getElementById('disp-fare').innerText = "Rs. " + (mFare ? mFare : fare);
    }

    function endRide() {
        if(!sTime) return;
        navigator.geolocation.clearWatch(watchID);
        let finalFare = document.getElementById('disp-fare').innerText;
        let rid = "AMT-" + Date.now();
        let rideData = {
            rid: rid,
            date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString(),
            from: document.getElementById('start-loc').value || 'Unknown',
            to: document.getElementById('end-loc').value || 'Unknown',
            km: totalKm.toFixed(2),
            fare: finalFare
        };

        // Save to Firebase
        db.ref('rides/' + rid).set(rideData);

        // Save to Local Storage for history
        let h = JSON.parse(localStorage.getItem('taxi_history') || '[]');
        h.push(rideData);
        localStorage.setItem('taxi_history', JSON.stringify(h));

        // Show Receipt
        document.getElementById('r-content').innerHTML = `
            <div class="r-line"><span>ID:</span><span>${rid}</span></div>
            <div class="r-line"><span>Date:</span><span>${rideData.date}</span></div>
            <div class="r-line"><span>From:</span><span>${rideData.from}</span></div>
            <div class="r-line"><span>To:</span><span>${rideData.to}</span></div>
            <div class="r-line"><span>Distance:</span><span>${rideData.km} km</span></div>
        `;
        document.getElementById('r-total').innerText = "TOTAL: " + finalFare;
        toggleSection('receipt-modal');
    }

    function printReceipt() {
        const { jsPDF } = window.jspdf;
        html2canvas(document.querySelector("#receipt-area")).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF({ unit: 'mm', format: [80, 150] });
            pdf.addImage(imgData, 'PNG', 5, 5, 70, 100);
            pdf.save("Receipt.pdf");
        });
    }

    function showHistory() {
        toggleSection('history-section');
        let h = JSON.parse(localStorage.getItem('taxi_history') || '[]');
        document.getElementById('history-list').innerHTML = h.reverse().map(i => `
            <div style="border-bottom:1px solid #eee; padding:8px; font-size:11px;">
                <b>${i.date}</b> | ${i.km}km | <b>${i.fare}</b><br>${i.from} -> ${i.to}
            </div>
        `).join('');
    }

    function showRevenue() {
        let h = JSON.parse(localStorage.getItem('taxi_history') || '[]');
        let total = h.reduce((sum, i) => sum + parseInt(i.fare.replace('Rs. ', '')), 0);
        alert("සමස්ත ආදායම (Total Revenue): Rs. " + total);
    }

    function toggleSection(id) {
        let el = document.getElementById(id);
        el.style.display = (el.style.display === "block" || el.style.display === "flex") ? "none" : (id.includes('modal') ? "flex" : "block");
    }

    window.onload = () => {
        let s = JSON.parse(localStorage.getItem('taxi_settings') || '{"base":100,"rate":80,"wait":5}');
        BASE = s.base; RATE = s.rate; WAIT_RATE = s.wait;
        document.getElementById('set-base').value = BASE;
        document.getElementById('set-rate').value = RATE;
        document.getElementById('set-wait').value = WAIT_RATE;
    };

    function saveSettings() {
        let s = {
            base: parseInt(document.getElementById('set-base').value),
            rate: parseInt(document.getElementById('set-rate').value),
            wait: parseInt(document.getElementById('set-wait').value)
        };
        localStorage.setItem('taxi_settings', JSON.stringify(s));
        location.reload();
    }
</script>
</body>
</html>
